{% extends 'base.html' %}



{% block head %} 

<title>taskmaster</title>



{% endblock %}


{% block body %} 

<div class="content">
    <h1>Update task</h1>
    <div class="form">
        <form action="/update/{{ task.id }}" method="POST">
            <input type="text" name="content" id="content" placeholder="Add a task" value="{{ task.content}}">
            <input type="submit" value="update task">
        </form>
    </div>
</div>

{% endblock %}
